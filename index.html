<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>נאום ח״כ תהלה פרידמן</title>

  <style>
    :root {
      --page-bg: #0f5b5a;
      --card-bg: #ffffff;
      --text: #182033;
      --muted: #667085;
      --line: #e4e9f2;
      --title-accent: #d6ea2f;
      --active-bg: #e8f7c9;
      --active-border: #b6cf57;
      --radius: 24px;
      --shadow: 0 14px 34px rgba(0, 0, 0, .22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--page-bg);
      color: var(--text);
    }

    .page {
      width: min(82vw, 1500px);
      margin: 0 auto;
      padding: 38px 0 44px;
    }

    .header {
      text-align: right;
      margin-bottom: 26px;
    }

    .title {
      margin: 0;
      line-height: .95;
      letter-spacing: -0.045em;
    }

    .title-small {
      display: block;
      color: #ffffff;
      font-size: clamp(34px, 3vw, 52px);
      font-weight: 500;
      margin-bottom: 5px;
    }

    .title-large {
      display: block;
      color: var(--title-accent);
      font-size: clamp(52px, 5vw, 82px);
      font-weight: 900;
    }

    .subtitle {
      margin: 14px 0 0;
      color: rgba(255, 255, 255, .94);
      font-size: 17px;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(340px, .9fr);
      gap: 28px;
      align-items: stretch;
      direction: ltr;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      height: min(68vh, 720px);
      direction: rtl;
    }

    .video-card {
      display: flex;
      flex-direction: column;
    }

    .video-wrap {
      flex: 1;
      min-height: 0;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #111827;
    }

    .controls {
      min-height: 88px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #ffffff;
      border-top: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .controls button {
      appearance: none;
      border: 1px solid #d6deea;
      background: #ffffff;
      color: var(--text);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
    }

    .controls button:hover {
      border-color: #7c8aa0;
      background: #f8fafc;
    }

    .transcript-card {
      display: flex;
      flex-direction: column;
    }

    .search-area {
      padding: 18px 18px 12px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      flex: 0 0 auto;
    }

    #search {
      width: 100%;
      border: 1px solid #d9e1ee;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      outline: none;
      background: #ffffff;
    }

    #search:focus {
      border-color: #8aa0b8;
      box-shadow: 0 0 0 4px rgba(138, 160, 184, .14);
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .transcript-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
      scroll-behavior: smooth;
      background: #ffffff;
    }

    .cue {
      width: 100%;
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      margin: 5px 0;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 14px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      text-align: right;
    }

    .cue:hover {
      background: #f7f9fd;
      border-color: #edf1f7;
    }

    .cue.active {
      background: var(--active-bg);
      border-color: var(--active-border);
      box-shadow: 0 7px 20px rgba(182, 207, 87, .18);
    }

    .time {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      direction: ltr;
      text-align: left;
      font-size: 13px;
      padding-top: 2px;
    }

    .text {
      font-size: 15px;
      line-height: 1.55;
    }

    mark {
      background: #dff3a8;
      color: inherit;
      padding: 0 2px;
      border-radius: 4px;
    }

    .hidden {
      display: none !important;
    }

    .error {
      margin: 14px;
      padding: 12px 14px;
      border: 1px solid #fecaca;
      background: #fff1f2;
      border-radius: 12px;
      color: #991b1b;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .page {
        width: 94vw;
        padding: 24px 0 30px;
      }

      .header {
        margin-bottom: 20px;
      }

      .content {
        grid-template-columns: 1fr;
        direction: rtl;
      }

      .card {
        height: auto;
      }

      .video-card {
        min-height: 460px;
      }

      .transcript-card {
        height: 55vh;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <h1 class="title">
        <span class="title-small">נאום בכורה בכנסת</span>
        <span class="title-large">תהלה פרידמן</span>
      </h1>
    </header>

    <section class="content">
      <article class="card video-card">
        <div class="video-wrap">
          <video id="video" controls preload="metadata" playsinline crossorigin="anonymous">
            <source src="https://res.cloudinary.com/nrjhmk3e/video/upload/v1784624201/%D7%AA%D7%94%D7%99%D7%9C%D7%94_%D7%A4%D7%A8%D7%99%D7%93%D7%9E%D7%9F_%D7%9E%D7%9B%D7%97%D7%95%D7%9C_%D7%9C%D7%91%D7%9F_mft0sg.mp4" type="video/mp4" />
            הדפדפן שלך לא תומך בנגן וידאו HTML5.
          </video>
        </div>

        <div class="controls">
          <button type="button" id="back10">↩ 10 שניות</button>
          <button type="button" id="restart">מהתחלה</button>
          <button type="button" id="forward10">10 שניות ↪</button>
        </div>

        <div id="videoError" class="error hidden">
          הסרטון לא נטען. בדוק שכתובת הסרטון פתוחה לצפייה ציבורית.
        </div>
      </article>

      <aside class="card transcript-card">
        <div class="search-area">
          <input id="search" type="search" placeholder="חיפוש בתמלול..." autocomplete="off" />

          <div class="status">
            <span id="count">טוען תמלול...</span>
            <span id="currentTime">00:00</span>
          </div>
        </div>

        <div id="transcript" class="transcript-list" aria-label="תמלול לחיץ"></div>
      </aside>
    </section>
  </main>

  <script>
    const TRANSCRIPT = [{"start": 0.0, "end": 5.6, "text": "שלוש פעמים בתוך שנה וחצי ניסיתם לנצח, לכופף, להכריע, להכניע."}, {"start": 5.6, "end": 10.6, "text": "חייבים להפסיק את זה. חייבים להפסיק לנסות לנצח."}, {"start": 10.6, "end": 14.6, "text": "אסור שישראל הראשונה תכריע את ישראל השנייה,"}, {"start": 14.6, "end": 17.6, "text": "אבל אסור גם שישראל השנייה תכריע את ישראל הראשונה."}, {"start": 17.6, "end": 20.6, "text": "אסור לנצח אחד את השני."}, {"start": 20.6, "end": 26.0, "text": "אני יהודייה, דתייה, ציונית-דתית, לאומית, פמיניסטית, ירושלמית."}, {"start": 26.0, "end": 29.0, "text": "גדלתי לתוך שפה ומסורת מסוימים."}, {"start": 29.0, "end": 33.0, "text": "גדלתי לתוך בית, קהילה ומסורת שעיצבו אותי."}, {"start": 33.0, "end": 37.0, "text": "יש בעולם שלי המון אמת ויופי וטוב,"}, {"start": 37.0, "end": 41.0, "text": "אבל לא כל האמת, לא כל היופי, לא כל הטוב."}, {"start": 41.0, "end": 44.0, "text": "אני לא רוצה שכולם יהפכו להיות אני."}, {"start": 44.0, "end": 47.0, "text": "לא רוצה שכולם יאמינו באותם דברים כמוני,"}, {"start": 47.0, "end": 51.0, "text": "כי אני יודעת שגם בקהילות ועולמות אחרים יש אמת ויופי וטוב,"}, {"start": 51.0, "end": 53.0, "text": "ויש לי מה ללמוד מהם."}, {"start": 53.0, "end": 58.0, "text": "אלה ימי הבית השלישי, ובדיוק כמו השניים שקדמו לו, הוא שביר."}, {"start": 58.0, "end": 64.0, "text": "הוא דליק, הוא לא מובן מאליו."}, {"start": 64.0, "end": 68.0, "text": "היציבות שלו היא באחריותינו."}, {"start": 68.0, "end": 71.0, "text": "הקיום שלו תלוי בנו."}, {"start": 71.0, "end": 74.0, "text": "זאת המשמרת שלנו."}, {"start": 74.0, "end": 76.0, "text": "תודה."}];

    const video = document.getElementById('video');
    const transcriptEl = document.getElementById('transcript');
    const searchEl = document.getElementById('search');
    const countEl = document.getElementById('count');
    const currentTimeEl = document.getElementById('currentTime');
    const videoError = document.getElementById('videoError');

    let cueElements = [];
    let activeIndex = -1;

    function formatTime(seconds) {
      seconds = Math.max(0, Math.floor(Number(seconds) || 0));
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;

      if (h > 0) {
        return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      }

      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#39;',
        '"': '&quot;'
      }[ch]));
    }

    function highlightText(text, query) {
      const safe = escapeHtml(text);
      if (!query) return safe;

      const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

      try {
        return safe.replace(
          new RegExp(escapedQuery, 'gi'),
          match => `<mark>${match}</mark>`
        );
      } catch {
        return safe;
      }
    }

    function renderTranscript() {
      const query = searchEl.value.trim();
      const fragment = document.createDocumentFragment();

      transcriptEl.innerHTML = '';
      cueElements = [];

      let visibleCount = 0;

      TRANSCRIPT.forEach((cue, index) => {
        const matches = !query || cue.text.includes(query);
        if (!matches) return;

        visibleCount += 1;

        const row = document.createElement('button');
        row.type = 'button';
        row.className = 'cue';
        row.dataset.index = String(index);
        row.dataset.start = String(cue.start);

        row.innerHTML = `
          <span class="time">${formatTime(cue.start)}</span>
          <span class="text">${highlightText(cue.text, query)}</span>
        `;

        row.addEventListener('click', () => {
          video.currentTime = cue.start;
          video.play().catch(() => {});
          setActive(index, true);
        });

        fragment.appendChild(row);
        cueElements[index] = row;
      });

      transcriptEl.appendChild(fragment);

      countEl.textContent = query
        ? `${visibleCount} תוצאות מתוך ${TRANSCRIPT.length} שורות`
        : `${TRANSCRIPT.length} שורות תמלול`;

      updateActive();
    }

    function findActiveIndex(time) {
      let low = 0;
      let high = TRANSCRIPT.length - 1;
      let answer = -1;

      while (low <= high) {
        const middle = Math.floor((low + high) / 2);

        if (TRANSCRIPT[middle].start <= time) {
          answer = middle;
          low = middle + 1;
        } else {
          high = middle - 1;
        }
      }

      return answer;
    }

    function setActive(index, shouldScroll) {
      const previous = cueElements[activeIndex];
      if (previous) previous.classList.remove('active');

      activeIndex = index;

      const current = cueElements[activeIndex];

      if (current) {
        current.classList.add('active');

        if (shouldScroll) {
          current.scrollIntoView({
            block: 'center',
            behavior: 'smooth'
          });
        }
      }
    }

    function updateActive() {
      currentTimeEl.textContent = formatTime(video.currentTime || 0);
      setActive(findActiveIndex(video.currentTime || 0), false);
    }

    video.addEventListener('timeupdate', updateActive);
    video.addEventListener('loadedmetadata', updateActive);
    video.addEventListener('error', () => videoError.classList.remove('hidden'));

    searchEl.addEventListener('input', renderTranscript);

    document.getElementById('back10').addEventListener('click', () => {
      video.currentTime = Math.max(0, video.currentTime - 10);
    });

    document.getElementById('forward10').addEventListener('click', () => {
      video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 10);
    });

    document.getElementById('restart').addEventListener('click', () => {
      video.currentTime = 0;
      video.play().catch(() => {});
    });

    renderTranscript();
  </script>
</body>
</html>
